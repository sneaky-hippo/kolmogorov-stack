[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "kolm-langchain"
version = "0.1.0"
description = "First-party LangChain adapter for kolm.ai compiled artifacts. Drop a .kolm into any LangChain agent in 3 lines."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
authors = [{ name = "kolm.ai" }]
keywords = ["kolm", "kolm.ai", "langchain", "llm", "ai-compiler", "lora", "edge", "inference"]
classifiers = [
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Operating System :: OS Independent",
]

dependencies = []

[project.optional-dependencies]
langchain = ["langchain-core>=0.1.0"]
http = ["httpx>=0.27"]

[project.urls]
Homepage = "https://kolm.ai/integrations"
Source = "https://github.com/sneaky-hippo/kolm-stack"
Issues = "https://github.com/sneaky-hippo/kolm-stack/issues"

[tool.setuptools.packages.find]
include = ["kolm_langchain*"]
