<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Kolm aurora field">
  <defs>
    <linearGradient id="night" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#050610"/>
      <stop offset=".55" stop-color="#080b18"/>
      <stop offset="1" stop-color="#050610"/>
    </linearGradient>

    <linearGradient id="ribbonA" x1="60" y1="280" x2="1540" y2="540" gradientUnits="userSpaceOnUse">
      <stop offset="0"   stop-color="#5be8b6" stop-opacity="0"/>
      <stop offset=".22" stop-color="#5be8b6" stop-opacity=".55"/>
      <stop offset=".48" stop-color="#4dd1ff" stop-opacity=".82"/>
      <stop offset=".74" stop-color="#aa9cff" stop-opacity=".78"/>
      <stop offset="1"   stop-color="#aa9cff" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="ribbonB" x1="80" y1="640" x2="1500" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0"   stop-color="#4dd1ff" stop-opacity="0"/>
      <stop offset=".24" stop-color="#4dd1ff" stop-opacity=".62"/>
      <stop offset=".5"  stop-color="#aa9cff" stop-opacity=".78"/>
      <stop offset=".78" stop-color="#5be8b6" stop-opacity=".58"/>
      <stop offset="1"   stop-color="#5be8b6" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="ribbonC" x1="1500" y1="780" x2="120" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0"   stop-color="#aa9cff" stop-opacity="0"/>
      <stop offset=".22" stop-color="#aa9cff" stop-opacity=".55"/>
      <stop offset=".5"  stop-color="#4dd1ff" stop-opacity=".68"/>
      <stop offset=".82" stop-color="#5be8b6" stop-opacity=".5"/>
      <stop offset="1"   stop-color="#5be8b6" stop-opacity="0"/>
    </linearGradient>

    <radialGradient id="bloomA" cx="38%" cy="44%" r="46%">
      <stop offset="0"   stop-color="#aa9cff" stop-opacity=".34"/>
      <stop offset=".55" stop-color="#4dd1ff" stop-opacity=".12"/>
      <stop offset="1"   stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bloomB" cx="74%" cy="62%" r="38%">
      <stop offset="0"   stop-color="#5be8b6" stop-opacity=".26"/>
      <stop offset=".55" stop-color="#4dd1ff" stop-opacity=".1"/>
      <stop offset="1"   stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <filter id="soft" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <filter id="softer" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="34"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#night)"/>
  <rect width="1600" height="900" fill="url(#bloomA)"/>
  <rect width="1600" height="900" fill="url(#bloomB)"/>

  <g filter="url(#softer)" opacity=".9">
    <path d="M -40 460 C 280 320 580 600 880 440 S 1340 320 1660 480 L 1660 540 C 1340 380 1080 660 800 500 S 280 380 -40 540 Z" fill="url(#ribbonA)"/>
    <path d="M -40 380 C 320 220 620 540 920 360 S 1380 220 1660 400 L 1660 460 C 1380 280 1100 620 800 420 S 320 280 -40 460 Z" fill="url(#ribbonB)" opacity=".82"/>
    <path d="M -40 580 C 280 480 600 720 900 580 S 1380 480 1660 600 L 1660 660 C 1380 540 1080 800 800 640 S 280 540 -40 660 Z" fill="url(#ribbonC)" opacity=".7"/>
  </g>

  <g filter="url(#soft)" opacity=".68">
    <path d="M -40 480 C 240 360 540 600 840 460 S 1320 340 1660 500" stroke="#4dd1ff" stroke-opacity=".4" stroke-width="2" fill="none"/>
    <path d="M -40 420 C 280 280 600 580 920 400 S 1360 260 1660 440" stroke="#aa9cff" stroke-opacity=".5" stroke-width="2" fill="none"/>
    <path d="M -40 560 C 280 460 600 700 880 560 S 1340 460 1660 580" stroke="#5be8b6" stroke-opacity=".34" stroke-width="2" fill="none"/>
  </g>
</svg>
