<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="kolm serve and MCP fanout">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101514"/>
      <stop offset="1" stop-color="#050607"/>
    </linearGradient>
    <linearGradient id="signal" x1="220" y1="650" x2="1380" y2="250" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4c7dff"/>
      <stop offset=".52" stop-color="#3af2ff"/>
      <stop offset="1" stop-color="#ff6f3c"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="170" y="140" width="1260" height="620" rx="12" fill="#0b0f10" stroke="#faf2e1" stroke-opacity=".14"/>
  <g transform="translate(250 315)">
    <rect width="320" height="220" rx="12" fill="#faf2e1"/>
    <text x="38" y="78" fill="#070809" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Inter',system-ui,sans-serif" font-size="42" font-weight="800">kolm serve</text>
    <text x="40" y="126" fill="#40443d" font-family="ui-monospace,'SF Mono',Consolas,monospace" font-size="18">local artifact server</text>
    <text x="40" y="174" fill="#070809" font-family="ui-monospace,'SF Mono',Consolas,monospace" font-size="18">localhost:8787</text>
  </g>
  <path d="M570 425h290" stroke="url(#signal)" stroke-width="6"/>
  <g transform="translate(880 196)">
    <rect width="420" height="96" rx="10" fill="#101514" stroke="#faf2e1" stroke-opacity=".14"/>
    <rect y="168" width="420" height="96" rx="10" fill="#101514" stroke="#faf2e1" stroke-opacity=".14"/>
    <rect y="336" width="420" height="96" rx="10" fill="#101514" stroke="#faf2e1" stroke-opacity=".14"/>
    <text x="34" y="58" fill="#faf2e1" font-family="ui-monospace,'SF Mono',Consolas,monospace" font-size="22">MCP tool</text>
    <text x="34" y="226" fill="#faf2e1" font-family="ui-monospace,'SF Mono',Consolas,monospace" font-size="22">REST API</text>
    <text x="34" y="394" fill="#faf2e1" font-family="ui-monospace,'SF Mono',Consolas,monospace" font-size="22">batch runner</text>
  </g>
  <path d="M860 425 C820 280 820 244 880 244M860 425h20M860 425 C820 570 820 580 880 580" stroke="url(#signal)" stroke-width="5" fill="none"/>
  <text x="250" y="690" fill="#b5bdb1" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Text','Inter',system-ui,sans-serif" font-size="28">Serve the same signed artifact through agents, APIs, or batch jobs without opening a model endpoint to the network.</text>
