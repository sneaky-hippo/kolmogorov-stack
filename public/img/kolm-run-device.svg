<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="kolm local device runtime">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101514"/>
      <stop offset="1" stop-color="#050607"/>
    </linearGradient>
    <linearGradient id="signal" x1="260" y1="680" x2="1340" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4c7dff"/>
      <stop offset=".52" stop-color="#3af2ff"/>
      <stop offset="1" stop-color="#ff6f3c"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <g transform="translate(280 110)">
    <rect width="430" height="680" rx="48" fill="#070809" stroke="#faf2e1" stroke-opacity=".18" stroke-width="3"/>
    <rect x="32" y="52" width="366" height="576" rx="18" fill="#0b0f10"/>
    <text x="66" y="122" fill="#737c73" font-family="ui-monospace,'SF Mono',Consolas,monospace" font-size="17">LOCAL RUNTIME</text>
    <text x="66" y="184" fill="#faf2e1" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Inter',system-ui,sans-serif" font-size="42" font-weight="780">health-coach</text>
    <rect x="66" y="236" width="298" height="88" rx="10" fill="#101514" stroke="#faf2e1" stroke-opacity=".10"/>
    <rect x="66" y="354" width="298" height="88" rx="10" fill="#101514" stroke="#faf2e1" stroke-opacity=".10"/>
    <rect x="66" y="472" width="298" height="88" rx="10" fill="#faf2e1"/>
    <text x="92" y="288" fill="#faf2e1" font-family="ui-monospace,'SF Mono',Consolas,monospace" font-size="20">personalize()</text>
    <text x="92" y="406" fill="#faf2e1" font-family="ui-monospace,'SF Mono',Consolas,monospace" font-size="20">run()</text>
    <text x="92" y="524" fill="#070809" font-family="ui-monospace,'SF Mono',Consolas,monospace" font-size="20">receipt: verified</text>
  </g>
  <g transform="translate(820 246)">
    <text x="0" y="0" fill="#faf2e1" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Inter',system-ui,sans-serif" font-size="66" font-weight="780">Data stays on the device.</text>
    <text x="2" y="70" fill="#b5bdb1" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Text','Inter',system-ui,sans-serif" font-size="30">A .kolm artifact carries the model delta, recall index, and verifier. Runtime calls do not need cloud egress.</text>
    <path d="M4 178h512" stroke="url(#signal)" stroke-width="6"/>
    <text x="4" y="250" fill="#4c7dff" font-family="ui-monospace,'SF Mono',Consolas,monospace" font-size="24">$ kolm run health-coach.kolm</text>
    <text x="4" y="298" fill="#faf2e1" font-family="ui-monospace,'SF Mono',Consolas,monospace" font-size="24">ok: no network, 96 ms p50, receipt signed</text>
  </g>
</svg>
