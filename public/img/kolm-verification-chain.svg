<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="kolm verification receipt chain">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101514"/>
      <stop offset="1" stop-color="#050607"/>
    </linearGradient>
    <linearGradient id="signal" x1="180" y1="650" x2="1420" y2="250" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4c7dff"/>
      <stop offset=".52" stop-color="#3af2ff"/>
      <stop offset="1" stop-color="#ff6f3c"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="150" y="140" width="1300" height="620" rx="12" fill="#0b0f10" stroke="#faf2e1" stroke-opacity=".14"/>
  <text x="210" y="230" fill="#faf2e1" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Inter',system-ui,sans-serif" font-size="58" font-weight="780">Receipts, not promises.</text>
  <text x="212" y="280" fill="#b5bdb1" font-family="ui-monospace,'SF Mono',Consolas,monospace" font-size="19">prompt -> manifest -> output -> verifier -> signature</text>

  <g transform="translate(220 380)">
    <rect width="230" height="140" rx="10" fill="#101514" stroke="#faf2e1" stroke-opacity=".14"/>
    <rect x="300" width="230" height="140" rx="10" fill="#101514" stroke="#faf2e1" stroke-opacity=".14"/>
    <rect x="600" width="230" height="140" rx="10" fill="#101514" stroke="#faf2e1" stroke-opacity=".14"/>
    <rect x="900" width="230" height="140" rx="10" fill="#faf2e1"/>
    <path d="M230 70h70M530 70h70M830 70h70" stroke="url(#signal)" stroke-width="5"/>
    <text x="32" y="62" fill="#737c73" font-family="ui-monospace,'SF Mono',Consolas,monospace" font-size="16">01</text>
    <text x="32" y="98" fill="#faf2e1" font-family="ui-monospace,'SF Mono',Consolas,monospace" font-size="22">prompt_hash</text>
    <text x="332" y="62" fill="#737c73" font-family="ui-monospace,'SF Mono',Consolas,monospace" font-size="16">02</text>
    <text x="332" y="98" fill="#faf2e1" font-family="ui-monospace,'SF Mono',Consolas,monospace" font-size="22">manifest</text>
    <text x="632" y="62" fill="#737c73" font-family="ui-monospace,'SF Mono',Consolas,monospace" font-size="16">03</text>
    <text x="632" y="98" fill="#faf2e1" font-family="ui-monospace,'SF Mono',Consolas,monospace" font-size="22">verifier</text>
    <text x="932" y="62" fill="#070809" font-family="ui-monospace,'SF Mono',Consolas,monospace" font-size="16">04</text>
    <text x="932" y="98" fill="#070809" font-family="ui-monospace,'SF Mono',Consolas,monospace" font-size="22">signed</text>
  </g>

  <g transform="translate(210 620)">
    <text x="0" y="0" fill="#4c7dff" font-family="ui-monospace,'SF Mono',Consolas,monospace" font-size="24">$ kolm inspect receipt.json</text>
    <text x="0" y="46" fill="#faf2e1" font-family="ui-monospace,'SF Mono',Consolas,monospace" font-size="24">ok: artifact hash matches, output hash matches, K-score gate passed</text>
  </g>
</svg>
