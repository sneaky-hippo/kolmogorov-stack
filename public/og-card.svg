<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="kolm — compiler cache for intelligence">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"  stop-color="#050610"/>
      <stop offset="1"  stop-color="#080b18"/>
    </linearGradient>
    <linearGradient id="ribbon" x1="40" y1="320" x2="1160" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0"   stop-color="#5be8b6" stop-opacity="0"/>
      <stop offset=".25" stop-color="#5be8b6" stop-opacity=".42"/>
      <stop offset=".5"  stop-color="#4dd1ff" stop-opacity=".7"/>
      <stop offset=".78" stop-color="#aa9cff" stop-opacity=".62"/>
      <stop offset="1"   stop-color="#aa9cff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="iri" x1="74" y1="100" x2="166" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0"   stop-color="#5be8b6"/>
      <stop offset=".44" stop-color="#4dd1ff"/>
      <stop offset=".82" stop-color="#aa9cff"/>
      <stop offset="1"   stop-color="#d4c8ff"/>
    </linearGradient>
    <linearGradient id="brkOG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dde2ec" stop-opacity=".82"/>
      <stop offset="1" stop-color="#8893ad" stop-opacity=".62"/>
    </linearGradient>
    <radialGradient id="bloom" cx="38%" cy="40%" r="44%">
      <stop offset="0"   stop-color="#aa9cff" stop-opacity=".22"/>
      <stop offset=".55" stop-color="#4dd1ff" stop-opacity=".08"/>
      <stop offset="1"   stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-15%" y="-30%" width="130%" height="160%">
      <feGaussianBlur stdDeviation="36"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#bloom)"/>

  <g filter="url(#blur)" opacity=".82">
    <path d="M-60 360 C 220 240 460 460 720 340 S 1100 240 1280 360 L 1280 420 C 1100 300 760 540 480 400 S 220 300 -60 420 Z" fill="url(#ribbon)"/>
  </g>

  <g transform="translate(74 100)">
    <path d="M 36 0 L 16 0 L 16 174 L 36 174" fill="none" stroke="url(#brkOG)" stroke-width="5"/>
    <path d="M 130 0 L 150 0 L 150 174 L 130 174" fill="none" stroke="url(#brkOG)" stroke-width="5"/>
    <path d="M 50 14 L 64 14 L 64 80 L 110 14 L 118 14 L 86 86 L 118 162 L 110 162 L 64 92 L 64 162 L 50 162 Z" fill="url(#iri)"/>
  </g>

  <text x="290" y="190" fill="#f0f2f8" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display',Inter,system-ui,sans-serif" font-size="92" font-weight="540" letter-spacing="-3.6">kolm</text>
  <text x="294" y="232" fill="#8893ad" font-family="ui-monospace,'SF Mono',Menlo,Consolas,monospace" font-size="15" letter-spacing="6">COMPILER CACHE FOR INTELLIGENCE</text>

  <text x="76" y="402" fill="#f0f2f8" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display',Inter,system-ui,sans-serif" font-size="60" font-weight="600" letter-spacing="-1.8">Compile frontier behavior once.</text>
  <text x="76" y="470" fill="#f0f2f8" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display',Inter,system-ui,sans-serif" font-size="60" font-weight="600" letter-spacing="-1.8">Run it locally forever.</text>
  <text x="76" y="534" fill="#8893ad" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Text',Inter,system-ui,sans-serif" font-size="22" font-weight="400">kolm compile · kolm serve --mcp · K-score on every artifact</text>
</svg>
